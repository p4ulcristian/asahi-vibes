---
# EasyEffects: bass EQ for the RayNeo glasses (DisplayPort audio).
# The glasses' DP audio is a flat raw stream; this restores low-end via a
# Bass Enhancer (psychoacoustic harmonics) + low-shelf EQ. The autoload entry
# applies the preset ONLY when the Apple DisplayPort sink is the output, so
# built-in speakers / AirPods are left untouched.
# (easyeffects package is installed by the packages role; autostart is in the
#  hyprland role.)

- name: Create EasyEffects output preset dir
  become: false
  file:
    path: "{{ lookup('env', 'HOME') }}/.local/share/easyeffects/output"
    state: directory

- name: Create EasyEffects autoload dir
  become: false
  file:
    path: "{{ lookup('env', 'HOME') }}/.local/share/easyeffects/autoload/output"
    state: directory

- name: Deploy Glasses-Bass preset
  become: false
  copy:
    src: "output/Glasses-Bass.json"
    dest: "{{ lookup('env', 'HOME') }}/.local/share/easyeffects/output/Glasses-Bass.json"

- name: Deploy per-device autoload association (glasses -> Glasses-Bass)
  become: false
  copy:
    src: "autoload-output/alsa_output.platform-238334000.audio-controller.stereo-fallback:output:stereo-fallback.json"
    dest: "{{ lookup('env', 'HOME') }}/.local/share/easyeffects/autoload/output/alsa_output.platform-238334000.audio-controller.stereo-fallback:output:stereo-fallback.json"
