---
- name: Install base packages
  become: true
  community.general.pacman:
    name:
      - zsh
      - git
      - github-cli
      - wireguard-tools
      - curl
      - wget
      - htop
      - neovim
      - chromium
      - powerline-fonts
      - waybar
      - rofi
      - grim
      - slurp
      - base-devel
      - hyprpaper
      - thunar
      - polkit-gnome
      - ttf-jetbrains-mono-nerd
      - noto-fonts-emoji
      - otf-font-awesome
    state: latest
    update_cache: true

- name: Install AUR packages
  become: false
  shell: yay -S --noconfirm --needed {{ item }}
  loop:
    - git-cola
    - anyrun
    - zsh-theme-powerlevel10k-git
    - networkmanager-dmenu-git
    - hyprmod
    - vesktop
  register: yay_result
  changed_when: "'nothing to do' not in yay_result.stdout"
