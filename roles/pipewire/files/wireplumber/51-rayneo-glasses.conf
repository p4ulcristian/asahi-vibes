# RayNeo glasses DisplayPort audio sink:
#  - clear, distinct name (was the generic "Built-in Audio Stereo")
#  - force S16_LE: the Asahi dcp-dp-audio 24-bit path prepares but never
#    starts the PCM (silence); 16-bit runs correctly.
#  - never suspend: the DP-audio driver wedges (PCM stuck PREPARED) when it
#    gets suspended+resumed (e.g. switching output to HomePod and back), so
#    keep the node always alive.
monitor.alsa.rules = [
    {
        matches = [
            { node.name = "~alsa_output.platform-238334000.audio-controller.*" }
        ]
        actions = {
            update-props = {
                node.description = "RayNeo Glasses"
                node.nick = "RayNeo Glasses"
                audio.format = "S16LE"
                session.suspend-timeout-seconds = 0
            }
        }
    }
]
