# Equalizer for the RayNeo Air 4 Pro glasses — ports the EQ bands from the
# old EasyEffects "Glasses-Bass" preset into a native PipeWire filter-chain
# so we get the tuning WITHOUT EasyEffects (which hijacked the mic).
#
# Output-only chain: apps -> rayneo_eq (this) -> rayneo_bass (Calf exciter,
# 99-rayneo-bass.conf) -> Apple DP sink. Pure builtin biquads, no LV2, no
# source/mic ever created. Tune live with pw-cli (see bottom of file).
#
# Bands (retuned for the Air 4 Pro's tiny open-ear drivers — they can't
# reproduce 60-110 Hz, so sub boost there just distorts/flaps ("weird"/boomy);
# energy is moved up to 200 Hz where the drivers have real body):
#   - bq_lowshelf  110 Hz  +2.5 dB  Q 0.7   gentle low-end, no boom
#   - bq_peaking   200 Hz  +3.5 dB  Q 1.0   body/warmth (the audible "bass")
context.modules = [
    { name = libpipewire-module-filter-chain
        args = {
            node.description = "RayNeo Glasses (EQ)"
            media.name       = "RayNeo Glasses (EQ)"
            filter.graph = {
                nodes = [
                    { type = builtin  label = bq_lowshelf  name = eq_lowshelf
                        control = { "Freq" = 110.0  "Q" = 0.7  "Gain" = 6.0 } }
                    { type = builtin  label = bq_peaking   name = eq_bell
                        control = { "Freq" = 60.0   "Q" = 1.0  "Gain" = 4.0 } }
                ]
                links = [
                    { output = "eq_lowshelf:Out"  input = "eq_bell:In" }
                ]
            }
            audio.channels = 2
            audio.position = [ FL FR ]
            capture.props = {
                node.name        = "rayneo_eq"
                node.description = "RayNeo Glasses (EQ)"
                media.class      = Audio/Sink
            }
            playback.props = {
                node.name     = "rayneo_eq.out"
                node.passive  = true
                audio.format  = "S16LE"
                target.object = "rayneo_bass"
            }
        }
    }
]
# Live-tune without restart (no driver churn), e.g. bump the low-shelf gain:
#   pw-cli set-param <rayneo_eq node id> Props '{ params = [ "eq_lowshelf:Gain" 4.0 ] }'
