# Bass for the RayNeo glasses via Calf Bass Enhancer (the same plugin
# EasyEffects uses) — loaded as an output-only filter-chain SINK, so it
# generates bass harmonics (perceived low-end on tiny drivers) without
# ever creating a mic/source or reparenting other apps. Feeds the real
# glasses DP sink. Values tuned by ear (clean, no distortion).
context.modules = [
    { name = libpipewire-module-filter-chain
        args = {
            node.description = "RayNeo Glasses (Bass)"
            media.name       = "RayNeo Glasses (Bass)"
            filter.graph = {
                nodes = [
                    {   type = lv2  name = be
                        plugin = "http://calf.sourceforge.net/plugins/BassEnhancer"
                        control = { "amount" = 3.0  "drive" = 3.5  "freq" = 110.0  "blend" = 0.0  "level_out" = 0.8 }
                    }
                ]
            }
            capture.props = {
                node.name        = "rayneo_bass"
                node.description = "RayNeo Glasses (Bass)"
                media.class      = Audio/Sink
            }
            playback.props = {
                node.name    = "rayneo_bass.out"
                node.passive = true
                audio.format = "S16LE"
                target.object = "alsa_output.platform-238334000.audio-controller.stereo-fallback"
            }
        }
    }
]
