# Bass + loudness for the RayNeo Air 4 Pro glasses — output-only filter-chain
# SINK (apps -> rayneo_eq -> rayneo_bass -> Apple DP). Never creates a mic/source.
#   be  = Calf Bass Enhancer -> harmonic exciter (perceived low-end on the tiny
#         open-ear drivers, which can't do real sub-bass).
#   lim = Calf Limiter used as a LOUDNESS stage, NOT peak protection. The raw
#         glasses handle loud bass cleanly (verified 2026-06-12 by bypassing the
#         whole pipeline), so this is purely to push level up.
#
# CRITICAL bass-safe tuning (learned the hard way): a FAST limiter attack gates
# individual low-freq cycles -> "cutting out on loud bass". Calf clamps attack at
# 10 ms max; combined with 4x oversampling + ASC (anti-bass-distortion) and a
# gentle level_in push, 10 ms is slow enough to stay clean while adding loudness.
# Do NOT lower the attack. If more loudness is ever needed without artifacts,
# switch lim to a Calf Compressor (attack 30-50 ms, makeup gain) instead.
context.modules = [
    { name = libpipewire-module-filter-chain
        args = {
            node.description = "RayNeo Glasses (Bass)"
            media.name       = "RayNeo Glasses (Bass)"
            filter.graph = {
                nodes = [
                    {   type = lv2  name = be
                        plugin = "http://calf.sourceforge.net/plugins/BassEnhancer"
                        control = { "amount" = 2.0  "drive" = 2.0  "freq" = 130.0  "blend" = 0.0  "level_out" = 0.85 }
                    }
                    {   type = lv2  name = lim
                        plugin = "http://calf.sourceforge.net/plugins/Limiter"
                        control = { "level_in" = 2.0  "level_out" = 1.0  "limit" = 0.97  "attack" = 10.0  "release" = 300.0  "asc" = 1.0  "oversampling" = 4.0  "auto_level" = 0.0 }
                    }
                ]
                links = [
                    { output = "be:out_l"  input = "lim:in_l" }
                    { output = "be:out_r"  input = "lim:in_r" }
                ]
            }
            capture.props = {
                node.name        = "rayneo_bass"
                node.description = "RayNeo Glasses (Bass)"
                media.class      = Audio/Sink
            }
            playback.props = {
                node.name    = "rayneo_bass.out"
                node.passive = true
                audio.format = "S16LE"
                target.object = "alsa_output.platform-238334000.audio-controller.stereo-fallback"
            }
        }
    }
]
# Live-tune (no restart):
#   louder       : pw-cli set-param <rayneo_bass id> Props '{ params = [ "lim:level_in" 1.6 ] }'
#   if bass gates : RAISE attack toward 10 (max) or swap lim to a Compressor; never lower it
#   more exciter : ... '{ params = [ "be:drive" 2.5 "be:amount" 2.5 ] }'
