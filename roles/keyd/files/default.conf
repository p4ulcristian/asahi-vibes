[ids]
*

[main]
leftmeta = layer(cmd)
rightmeta = layer(cmd)

[cmd:M]
# App shortcuts -> Ctrl equivalents (override Meta passthrough for these keys)
a = C-a
c = C-c
v = C-v
x = C-x
z = C-z
s = C-s
f = C-f
w = C-w
t = C-t
y = C-y

# Font size / zoom (mac-style, override Meta passthrough) -> Ctrl +/-
minus = C-minus
equal = C-equal

# Text navigation (mac-style, override Meta passthrough)
left = home
right = end
up = C-home
down = C-end
backspace = C-backspace

# All other Cmd+key (Enter, 1-9, Space, D, J, etc.) pass through as Super+key -> Hyprland
