# RayNeo glasses DisplayPort audio sink:
#  - give it a clear, distinct name (was the generic "Built-in Audio Stereo")
#  - force S16_LE: the Asahi dcp-dp-audio 24-bit path prepares but never
#    starts the PCM (silence); 16-bit runs correctly.
monitor.alsa.rules = [
    {
        matches = [
            { node.name = "~alsa_output.platform-238334000.audio-controller.*" }
        ]
        actions = {
            update-props = {
                node.description = "RayNeo Glasses"
                node.nick = "RayNeo Glasses"
                audio.format = "S16LE"
            }
        }
    }
]
