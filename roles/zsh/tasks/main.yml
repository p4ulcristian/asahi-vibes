---
- name: Check if oh-my-zsh is already installed
  become: false
  stat:
    path: "{{ lookup('env', 'HOME') }}/.oh-my-zsh"
  register: omz

- name: Install oh-my-zsh
  become: false
  shell: >
    sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
    --unattended
  when: not omz.stat.exists

- name: Link powerlevel10k theme into oh-my-zsh
  become: false
  file:
    src: /usr/share/zsh-theme-powerlevel10k
    dest: "{{ lookup('env', 'HOME') }}/.oh-my-zsh/custom/themes/powerlevel10k"
    state: link
    force: yes

- name: Deploy .zshrc
  become: false
  template:
    src: zshrc.j2
    dest: "{{ lookup('env', 'HOME') }}/.zshrc"
    backup: yes

- name: Deploy .p10k.zsh
  become: false
  copy:
    src: p10k.zsh
    dest: "{{ lookup('env', 'HOME') }}/.p10k.zsh"
    backup: yes

- name: Set zsh as default shell
  user:
    name: "{{ lookup('env', 'USER') }}"
    shell: /bin/zsh
