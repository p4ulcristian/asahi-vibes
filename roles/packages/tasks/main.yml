---
- name: Install base packages
  become: true
  community.general.pacman:
    name:
      - zsh
      - git
      - github-cli
      - wireguard-tools
      - curl
      - wget
      - htop
      - neovim
      - chromium
      - powerline-fonts
      - waybar
      - rofi
      - grim
      - slurp
      - wdisplays
      - base-devel
      - hyprpaper
      - thunar
      - polkit-gnome
      - ttf-jetbrains-mono-nerd
      - noto-fonts-emoji
      - otf-font-awesome
      - telegram-desktop
      - bluez
      - bluez-utils
      - brightnessctl
      - calf
      - pipewire-zeroconf
      - avahi
      - nss-mdns
    state: latest
    update_cache: true

- name: Enable and start bluetooth service
  become: true
  systemd:
    name: bluetooth.service
    enabled: true
    state: started

- name: Enable and start avahi (mDNS for AirPlay/HomePod discovery)
  become: true
  systemd:
    name: avahi-daemon.service
    enabled: true
    state: started

- name: Install AUR packages
  become: false
  shell: yay -S --noconfirm --needed {{ item }}
  loop:
    - git-cola
    - anyrun
    - zsh-theme-powerlevel10k-git
    - networkmanager-dmenu-git
    - vesktop
  register: yay_result
  changed_when: "'nothing to do' not in yay_result.stdout"
